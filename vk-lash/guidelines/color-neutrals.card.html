<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — cream to ink" subtitle="Warm cream, nude, taupe and ink" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .scale { display:flex; gap:0; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; align-items:flex-end; padding:8px; font:600 0.5rem/1.3 var(--font-sans); letter-spacing:0.04em; }
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--cream-50);color:var(--taupe-600)">50</div>
  <div class="sw" style="background:var(--cream-100);color:var(--taupe-600)">100</div>
  <div class="sw" style="background:var(--cream-200);color:var(--taupe-600)">200</div>
  <div class="sw" style="background:var(--nude-300);color:var(--brown-800)">nude 300</div>
  <div class="sw" style="background:var(--nude-400);color:var(--brown-800)">nude 400</div>
  <div class="sw" style="background:var(--taupe-500);color:#fff">taupe 500</div>
  <div class="sw" style="background:var(--taupe-600);color:#fff">taupe 600</div>
  <div class="sw" style="background:var(--brown-700);color:#fff">brown 700</div>
  <div class="sw" style="background:var(--brown-800);color:#fff">800</div>
  <div class="sw" style="background:var(--ink-900);color:var(--cream-100)">ink 900</div>
</div>
</body></html>
