<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style> body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-sans);} .row{display:flex;gap:18px;align-items:center;} .col{display:flex;flex-direction:column;align-items:center;gap:8px;font-size:0.5625rem;color:var(--text-muted);} .box{width:74px;height:60px;background:var(--surface-card);border:1px solid var(--border-soft);box-shadow:var(--shadow-xs);} </style></head>
<body>
<div class="row">
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div>xs · 4</div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div>sm · 8</div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div>md · 14</div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div>lg · 22</div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div>xl · 32</div>
  <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div>pill</div>
</div>
</body></html>
