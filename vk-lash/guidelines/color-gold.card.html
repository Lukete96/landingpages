<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .row { display:flex; gap:12px; }
  .sw { flex:1; height:96px; border-radius:var(--radius-md); display:flex; flex-direction:column; justify-content:flex-end; padding:10px; box-shadow:var(--shadow-xs); font:600 0.625rem/1.4 var(--font-sans); color:#5b4233; }
  .grad { color:#fff; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--gold-300)">gold 300</div>
  <div class="sw" style="background:var(--gold-400)">gold 400</div>
  <div class="sw" style="background:var(--gold-500);color:#fff">gold 500</div>
  <div class="sw grad" style="background:var(--gold-gradient)">gold gradient</div>
  <div class="sw grad" style="background:var(--rosegold-sheen)">rosegold sheen</div>
</div>
</body></html>
