<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — 1 through 10" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style> body{margin:0;padding:24px;background:var(--surface-page);font-family:var(--font-sans);} .row{display:flex;align-items:flex-end;gap:14px;} .col{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:0.5625rem;color:var(--text-muted);} .bar{background:var(--nude-400);border-radius:3px;width:22px;} </style></head>
<body>
<div class="row" id="r"></div>
<script>
  const s=[['1',4],['2',8],['3',12],['4',16],['5',24],['6',32],['7',48],['8',64],['9',96]];
  document.getElementById('r').innerHTML=s.map(([n,v])=>`<div class="col"><div class="bar" style="height:${v}px"></div>${n}<br>${v}px</div>`).join('');
</script>
</body></html>
