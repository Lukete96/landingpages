<!-- @dsCard group="Colors" viewport="700x150" name="Rose quartz & coral" subtitle="Signature accent — from the logo" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .scale { display:flex; gap:12px; }
  .sw { flex:1; height:96px; border-radius:var(--radius-md); display:flex; flex-direction:column; justify-content:flex-end; padding:10px; box-shadow:var(--shadow-xs); font:600 0.625rem/1.4 var(--font-sans); }
  .sw small { font-weight:400; opacity:0.75; }
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--rose-200);color:var(--rose-600)">200<small>#FFE4E0</small></div>
  <div class="sw" style="background:var(--rose-300);color:var(--rose-600)">300<small>#FFD0CB</small></div>
  <div class="sw" style="background:var(--rose-400);color:var(--ink-900)">400 · accent<small>#FFB0AC</small></div>
  <div class="sw" style="background:var(--rose-500);color:#fff">500<small>#E89089</small></div>
  <div class="sw" style="background:var(--rose-600);color:#fff">600<small>#C96F68</small></div>
</div>
</body></html>
