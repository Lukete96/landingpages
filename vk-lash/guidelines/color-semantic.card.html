<!-- @dsCard group="Colors" viewport="700x170" name="Semantic & functional" subtitle="Surfaces, text, WhatsApp green" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; background:var(--surface-page); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .sw { height:64px; border-radius:var(--radius-sm); border:1px solid var(--border-soft); display:flex; align-items:flex-end; padding:8px; font:600 0.5625rem/1.2 var(--font-sans); }
</style></head>
<body>
<div class="grid">
  <div class="sw" style="background:var(--surface-page);color:var(--text-muted)">surface-page</div>
  <div class="sw" style="background:var(--surface-card);color:var(--text-muted)">surface-card</div>
  <div class="sw" style="background:var(--surface-nude);color:var(--text-onnude)">surface-nude</div>
  <div class="sw" style="background:var(--surface-inverse);color:var(--cream-100)">surface-inverse</div>
  <div class="sw" style="background:var(--text-strong);color:#fff">text-strong</div>
  <div class="sw" style="background:var(--text-body);color:#fff">text-body</div>
  <div class="sw" style="background:var(--text-muted);color:#fff">text-muted</div>
  <div class="sw" style="background:var(--whatsapp);color:#fff">whatsapp</div>
</div>
</body></html>
